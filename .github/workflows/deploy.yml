name: Build & Push Docker image

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # (Khuyến nghị) thiết lập builder tốt hơn cho docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Tự động đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKENDOCKER }}

      # 2) Tự động Build image từ Dockerfile và 3) Push lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.USERNAME }}/demo_bai_7:latest
            ${{ secrets.USERNAME }}/demo_bai_7:${{ github.sha }}
